<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Submit Data</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 500px; margin: 60px auto; padding: 0 20px; }
    h1   { color: #333; }
    input { width: 100%; padding: 10px; margin: 8px 0 16px; box-sizing: border-box;
            border: 1px solid #ccc; border-radius: 4px; font-size: 14px; }
    button { background: #4CAF50; color: white; padding: 10px 24px;
             border: none; border-radius: 4px; cursor: pointer; font-size: 15px; }
    button:hover { background: #45a049; }
    .error { background: #ffe0e0; border: 1px solid #f44; color: #c00;
             padding: 10px; border-radius: 4px; margin-bottom: 16px; }
    a { color: #4CAF50; }
  </style>
</head>
<body>
  <h1>Submit User Data</h1>

  {% if error %}
    <div class="error">{{ error }}</div>
  {% endif %}

  <form method="POST" action="/submit">
    <label>Name</label>
    <input type="text" name="name" placeholder="Enter your name" required />

    <label>Email</label>
    <input type="email" name="email" placeholder="Enter your email" required />

    <label>City</label>
    <input type="text" name="city" placeholder="Enter your city" required />

    <button type="submit">Submit</button>
  </form>

  <p style="margin-top:30px;">
    View API data: <a href="/api" target="_blank">/api</a>
  </p>
</body>
</html>
